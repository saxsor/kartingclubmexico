services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    volumes:
      - uploads_data:/app/uploads
      - ./backend/google-service-account.json:/app/google-service-account.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health | grep -q '\"db\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_certs_www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal
      - external

volumes:
  nginx_certs:
  nginx_certs_www:
  uploads_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
