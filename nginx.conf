user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml
               text/javascript application/x-javascript;

    map $http_x_forwarded_proto $redirect_to_https {
        default 0;
        http 1;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Redirect HTTP to HTTPS
    # Uncomment after setting up Certbot:
    # server {
    #     listen 80;
    #     server_name tudominio.com www.tudominio.com;
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    # HTTP server (use during initial setup, replace with HTTPS once cert is ready)
    server {
        listen 80;
        server_name _;

        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }

        root /usr/share/nginx/html;
        index index.html;

        # Backend health check
        location = /health {
            proxy_pass http://backend:4000/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Serve uploaded files (receipts, etc.)
        location /uploads/ {
            proxy_pass http://backend:4000/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy /api to backend
        location /api/ {
            client_max_body_size 11m;
            proxy_pass http://backend:4000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # SSE specific settings
            proxy_read_timeout 86400s;
            proxy_buffering off;
            proxy_cache off;
        }

        # Proxy frontend to the frontend container (serves its own static files)
        location / {
            proxy_pass http://frontend:80/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server — uncomment after Certbot setup:
    # server {
    #     listen 443 ssl http2;
    #     server_name tudominio.com www.tudominio.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     root /usr/share/nginx/html;
    #     index index.html;
    #
    #     location /api/ {
    #         client_max_body_size 11m;
    #         proxy_pass http://backend:4000/api/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection 'upgrade';
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_cache_bypass $http_upgrade;
    #         proxy_read_timeout 86400s;
    #         proxy_buffering off;
    #         proxy_cache off;
    #     }
    #
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #     }
    #
    #     location = /index.html {
    #         expires off;
    #         add_header Cache-Control "no-cache, no-store, must-revalidate";
    #     }
    # }
}
